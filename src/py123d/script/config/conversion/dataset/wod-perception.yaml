parser:
  _target_: py123d.parser.wod.wod_perception_parser.WODPerceptionParser
  _convert_: 'all'

  splits: ["wod-perception_val"]
  wod_perception_data_root: ${dataset_paths.wod_perception_data_root}
  zero_roll_pitch: true
  keep_polar_features: false
  add_map_pose_offset: false
  add_dummy_lane_groups: false

dataset_converter_config:
  _target_: py123d.parser.dataset_converter_config.DatasetConverterConfig
  _convert_: 'all'

  force_log_conversion: ${force_log_conversion}
  force_map_conversion: ${force_map_conversion}

  # Map
  include_map: true

  # Ego
  include_ego: true

  # Box Detections
  include_box_detections: true

  # Pinhole Cameras
  include_pinhole_cameras: true
  pinhole_camera_store_option: "jpeg_binary" # "path", "jpeg_binary", "png_binary", "mp4"

  # Lidars
  include_lidars: true
  lidar_store_option: "binary" #  "path", "binary"
  lidar_point_cloud_codec: "ipc_zstd" # None or "laz", "draco", "ipc_zstd", "ipc_lz4", "ipc"
  lidar_point_feature_codec: "ipc_zstd" # None or "ipc_zstd", "ipc_lz4", "ipc"

  # Not available:
  include_traffic_lights: false
  include_scenario_tags: false
  include_route: false
  include_fisheye_mei_cameras: false
