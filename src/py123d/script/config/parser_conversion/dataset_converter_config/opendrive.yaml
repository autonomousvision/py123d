_target_: py123d.parser.dataset_converter_config.DatasetConverterConfig
_convert_: 'all'

force_log_conversion: false
force_map_conversion: ${force_map_conversion}

# Map only
include_map: true

# No sensor data for OpenDRIVE
include_ego: false
include_box_detections: false
include_pinhole_cameras: false
include_fisheye_mei_cameras: false
include_lidars: false
include_traffic_lights: false
include_scenario_tags: false
include_route: false

pinhole_camera_store_option: "path"
lidar_store_option: "path"
lidar_point_cloud_codec: null
lidar_point_feature_codec: null
