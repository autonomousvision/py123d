hydra:
  output_subdir: null
  run:
    dir: .
  searchpath:
    - pkg://py123d.script.config
    - pkg://py123d.script.config.common
  job:
    chdir: False
#
defaults:
  - default_common
  - default_dataset_paths
  - override scene_filter: viser_scenes
  - override execution: thread_pool_executor
  - _self_

logger_level: info  # "debug", "info", "warning", "error"

viser_config:
  _target_: py123d.visualization.viser.viser_config.ViserConfig
  _convert_: 'all'

  server:
    host: "localhost"
    port: 8080
    label: "123D Viser Server"
    verbose: true

  theme:
    control_layout: "collapsible" # ["floating", "collapsible", "fixed"]
    control_width: "large" # ["small", "medium", "large"]
    dark_mode: true
    show_logo: true
    show_share_button: true

  playback:
    is_playing: false
    speed: 1.0

  map:
    visible: true
    radius: 200.0
    non_road_z_offset: 0.1
    requery: true

  detection:
    visible: true
    type: "mesh+lines" # ["mesh", "lines"]
    line_width: 4.0


  camera_gui:
    visible: true
    # types: null # Loads front camera by default
    image_scale: 4

  lidar:
    visible: true
    # ids: null # Loads merged by default
    point_size: 0.05
    point_shape: "circle" # ["square", "diamond", "circle", "rounded", "sparkle"]
